version: "3.8"

services:
  s3proxy:
    build:
      context: .
      target: base
    ports:
      - "9004:9000" # Expose the proxy on a different port to avoid conflicts
    environment:
      - OVERLAY_S3_URL=http://minio-overlay:9000
      - OVERLAY_BUCKET=overlay
      - ORIGIN_S3_URL=http://minio-origin:9000
      - AWS_ACCESS_KEY_ID=origin-access
      - AWS_SECRET_ACCESS_KEY=origin-secret
      - OVERLAY_AWS_ACCESS_KEY_ID=overlay-access
      - OVERLAY_AWS_SECRET_ACCESS_KEY=overlay-secret
    depends_on:
      origin-populator:
        condition: service_completed_successfully
      overlay-bucket-init:
        condition: service_completed_successfully
    entrypoint: "uvicorn app.main:app --host 0.0.0.0 --port 9000 --log-level debug"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 1s # Check every second (was 5s)
      timeout: 1s # Fail if check takes longer than 1s (was 3s)
      retries: 2 # Only need 2 successful checks (was 5)
      start_period: 2s # Give 2s for initial startup

  minio-overlay:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001" --quiet
    ports:
      - "9001:9001"
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: overlay-access
      MINIO_SECRET_KEY: overlay-secret
      MINIO_STORAGE_CLASS_STANDARD: EC:0
      MINIO_DISK_USAGE_CRAWL: "off"
    tmpfs:
      - /data:exec,size=1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 1s
      timeout: 1s
      retries: 2
      start_period: 1s

  minio-origin:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9002" --quiet
    ports:
      - "9002:9000"
    environment:
      MINIO_ACCESS_KEY: origin-access
      MINIO_SECRET_KEY: origin-secret
      MINIO_STORAGE_CLASS_STANDARD: EC:0
      MINIO_DISK_USAGE_CRAWL: "off"
    tmpfs:
      - /data:exec,size=1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 1s
      timeout: 1s
      retries: 2
      start_period: 1s

  overlay-bucket-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio-overlay:
        condition: service_healthy
    volumes:
      - ./init_overlay_bucket.sh:/init_overlay_bucket.sh
    entrypoint: "/init_overlay_bucket.sh"

  origin-buckets-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio-origin:
        condition: service_healthy
    volumes:
      - ./init_origin_buckets.sh:/init_origin_buckets.sh
    entrypoint: "/init_origin_buckets.sh"

  origin-populator:
    build:
      context: .
      target: test
    depends_on:
      origin-buckets-init:
        condition: service_completed_successfully
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - SCALE_FACTOR=${SCALE_FACTOR:-100}
    entrypoint: "python /app/tests/populate_origin.py"

  test-runner:
    build:
      context: .
      target: test
    depends_on:
      s3proxy:
        condition: service_healthy
    working_dir: /app/tests
    entrypoint: "pytest test_regression.py --disable-warnings --capture=no --scale-factor=100"
