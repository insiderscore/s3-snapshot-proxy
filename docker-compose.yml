version: "3.8"

services:
  s3proxy:
    build:
      context: .
      target: base
    ports:
      - "9004:9000"
    environment:
      - OVERLAY_S3_URL=http://minio-overlay:9000
      - OVERLAY_BUCKET=overlay
      - ORIGIN_S3_URL=https://s3.amazonaws.com
      - AWS_REGION=us-east-1
      - OVERLAY_AWS_ACCESS_KEY_ID=overlay-access
      - OVERLAY_AWS_SECRET_ACCESS_KEY=overlay-secret
      - AWS_PROFILE=${AWS_PROFILE}
    depends_on:
      - minio-overlay
      - minio-init
    volumes:
      - "~/.aws:/root/.aws"

  minio-overlay:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: overlay-access
      MINIO_SECRET_KEY: overlay-secret

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio-overlay
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio-overlay:9000 overlay-access overlay-secret; do sleep 1; done;
      mc mb local/overlay || true;
      mc version enable local/overlay;"
